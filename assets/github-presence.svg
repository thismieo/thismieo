<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 390" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Presence Dashboard</title>
  <desc id="desc">Animated dashboard highlighting repositories, contributions, and public activity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08060f"/>
      <stop offset="55%" stop-color="#0b1425"/>
      <stop offset="100%" stop-color="#170a17"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb4d83" stop-opacity="0.24"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.24"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="390" rx="26" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1397" height="387" rx="25" fill="none" stroke="url(#border)" stroke-width="3"/>

  <g font-family="Segoe UI, Inter, Arial, sans-serif" text-anchor="middle">
    <text x="700" y="55" font-size="32" font-weight="750" fill="#ffffff">GitHub Presence</text>
    <text x="700" y="82" font-size="13" fill="#aeb8d8" letter-spacing="2.3">PROJECTS • CONSISTENCY • PUBLIC PROGRESS</text>
  </g>

  <path id="activityRoute" d="M145 298 C310 238 470 344 700 286 C930 228 1090 338 1255 278" fill="none" stroke="url(#flow)" stroke-width="2" stroke-linecap="round" opacity="0.60"/>
  <path d="M145 298 C310 238 470 344 700 286 C930 228 1090 338 1255 278" fill="none" stroke="url(#flow)" stroke-width="0.9" stroke-dasharray="8 15" opacity="0.75">
    <animate attributeName="stroke-dashoffset" values="0;-260" dur="17s" repeatCount="indefinite"/>
  </path>
  <circle r="5" fill="#ffffff" filter="url(#glow)">
    <animateMotion dur="12s" repeatCount="indefinite"><mpath href="#activityRoute"/></animateMotion>
  </circle>

  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <g transform="translate(70 118)">
      <rect width="390" height="150" rx="22" fill="#0d0d18" stroke="#fb7185" stroke-opacity="0.42"/>
      <circle cx="46" cy="45" r="8" fill="#fb7185" filter="url(#glow)">
        <animate attributeName="r" values="6;10;6" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <text x="72" y="40" font-size="13" fill="#fda4af" letter-spacing="1.8">REPOSITORIES</text>
      <text x="30" y="82" font-size="25" font-weight="700" fill="#ffffff">Projects &amp; Experiments</text>
      <text x="30" y="112" font-size="15" fill="#cbd5e1">Code, documentation, and future AI implementations.</text>
      <text x="30" y="137" font-size="12" fill="#94a3b8">BUILD • TEST • DOCUMENT</text>
    </g>

    <g transform="translate(505 118)">
      <rect width="390" height="150" rx="22" fill="#0d101d" stroke="#c084fc" stroke-opacity="0.42"/>
      <circle cx="46" cy="45" r="8" fill="#c084fc" filter="url(#glow)">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="3.8s" repeatCount="indefinite"/>
      </circle>
      <text x="72" y="40" font-size="13" fill="#d8b4fe" letter-spacing="1.8">CONTRIBUTIONS</text>
      <text x="30" y="82" font-size="25" font-weight="700" fill="#ffffff">Consistency Record</text>
      <text x="30" y="112" font-size="15" fill="#cbd5e1">A visible timeline of learning, commits, and growth.</text>
      <text x="30" y="137" font-size="12" fill="#94a3b8">LEARN • COMMIT • IMPROVE</text>
    </g>

    <g transform="translate(940 118)">
      <rect width="390" height="150" rx="22" fill="#0b1322" stroke="#60a5fa" stroke-opacity="0.42"/>
      <circle cx="46" cy="45" r="8" fill="#60a5fa" filter="url(#glow)">
        <animate attributeName="r" values="6;10;6" dur="3.6s" begin="-1.1s" repeatCount="indefinite"/>
      </circle>
      <text x="72" y="40" font-size="13" fill="#93c5fd" letter-spacing="1.8">ACTIVITY</text>
      <text x="30" y="82" font-size="25" font-weight="700" fill="#ffffff">Public Engineering Journey</text>
      <text x="30" y="112" font-size="15" fill="#cbd5e1">Progress that converts knowledge into practical work.</text>
      <text x="30" y="137" font-size="12" fill="#94a3b8">PRACTICE • SHARE • GROW</text>
    </g>
  </g>

  <g font-family="JetBrains Mono, Consolas, monospace" text-anchor="middle">
    <rect x="435" y="320" width="530" height="40" rx="20" fill="#0b1020" stroke="#8b5cf6" stroke-opacity="0.38"/>
    <text x="700" y="346" font-size="15" fill="#d8ddff">public_progress = projects + consistency + time</text>
  </g>
</svg>