<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 150" role="img" aria-labelledby="title desc">
  <title id="title">Core identity icons</title>
  <desc id="desc">Five calm animated icons representing Python, artificial intelligence, problem solving, Git and GitHub, and learning in public.</desc>
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb4d83" stop-opacity="0"/>
      <stop offset="28%" stop-color="#fb4d83" stop-opacity="0.65"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.85"/>
      <stop offset="72%" stop-color="#3b82f6" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="fill" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1b1630"/>
      <stop offset="100%" stop-color="#090d18"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <path d="M130 75 C260 42 360 108 500 75 S740 42 870 75" fill="none" stroke="url(#line)" stroke-width="1.7" stroke-dasharray="8 13" opacity="0.8">
    <animate attributeName="stroke-dashoffset" values="0;-210" dur="16s" repeatCount="indefinite"/>
  </path>

  <g font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji, Segoe UI, sans-serif" text-anchor="middle">
    <g transform="translate(140 75)">
      <circle r="42" fill="url(#fill)" stroke="url(#ring)" stroke-width="2"/>
      <circle r="49" fill="none" stroke="#fb7185" stroke-width="1" opacity="0.18">
        <animate attributeName="r" values="44;54;44" dur="4.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.32;0.04;0.32" dur="4.8s" repeatCount="indefinite"/>
      </circle>
      <text y="12" font-size="34">🐍</text>
    </g>

    <g transform="translate(320 75)">
      <circle r="42" fill="url(#fill)" stroke="url(#ring)" stroke-width="2"/>
      <circle r="49" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.18">
        <animate attributeName="r" values="44;54;44" dur="5.2s" begin="-1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.32;0.04;0.32" dur="5.2s" begin="-1s" repeatCount="indefinite"/>
      </circle>
      <text y="12" font-size="34">🧠</text>
    </g>

    <g transform="translate(500 75)">
      <circle r="44" fill="url(#fill)" stroke="url(#ring)" stroke-width="2.2" filter="url(#glow)"/>
      <circle r="52" fill="none" stroke="#a855f7" stroke-width="1.2" opacity="0.25">
        <animate attributeName="r" values="46;57;46" dur="4.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0.05;0.4" dur="4.4s" repeatCount="indefinite"/>
      </circle>
      <text y="12" font-size="35">💡</text>
    </g>

    <g transform="translate(680 75)">
      <circle r="42" fill="url(#fill)" stroke="url(#ring)" stroke-width="2"/>
      <circle r="49" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.18">
        <animate attributeName="r" values="44;54;44" dur="5s" begin="-1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.32;0.04;0.32" dur="5s" begin="-1.8s" repeatCount="indefinite"/>
      </circle>
      <text y="11" font-size="35">⎇</text>
    </g>

    <g transform="translate(860 75)">
      <circle r="42" fill="url(#fill)" stroke="url(#ring)" stroke-width="2"/>
      <circle r="49" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.18">
        <animate attributeName="r" values="44;54;44" dur="5.4s" begin="-2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.32;0.04;0.32" dur="5.4s" begin="-2.5s" repeatCount="indefinite"/>
      </circle>
      <text y="12" font-size="34">📚</text>
    </g>
  </g>

  <g fill="#ffffff" filter="url(#glow)">
    <circle cx="230" cy="59" r="2.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.7s" repeatCount="indefinite"/></circle>
    <circle cx="410" cy="91" r="2.4"><animate attributeName="cy" values="91;83;91" dur="4.4s" repeatCount="indefinite"/></circle>
    <circle cx="590" cy="57" r="2.2"><animate attributeName="opacity" values="0.25;1;0.25" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="770" cy="93" r="2.4"><animate attributeName="cy" values="93;84;93" dur="4.7s" repeatCount="indefinite"/></circle>
  </g>
</svg>