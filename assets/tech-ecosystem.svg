<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 680" role="img" aria-labelledby="title desc">
  <title id="title">Mohammed Muayad Engineering Stack Architecture</title>
  <desc id="desc">Professional animated architecture diagram showing the active development foundation and the next data, machine learning, and deep learning layers.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07060d"/>
      <stop offset="52%" stop-color="#0a1425"/>
      <stop offset="100%" stop-color="#170a17"/>
    </linearGradient>

    <linearGradient id="border" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb4d83" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.28"/>
    </linearGradient>

    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>

    <linearGradient id="active" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#241337"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="dataLayer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102a46"/>
      <stop offset="100%" stop-color="#0b1628"/>
    </linearGradient>

    <linearGradient id="mlLayer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#28143a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="dlLayer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#351221"/>
      <stop offset="100%" stop-color="#15101d"/>
    </linearGradient>

    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#ffffff" stroke-opacity="0.022"/>
    </pattern>
  </defs>

  <rect x="34" y="18" width="1332" height="644" rx="28" fill="url(#bg)"/>
  <rect x="34" y="18" width="1332" height="644" rx="28" fill="url(#grid)"/>
  <rect x="35.5" y="19.5" width="1329" height="641" rx="26.5" fill="none" stroke="url(#border)" stroke-width="3"/>

  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <text x="88" y="72" font-size="31" font-weight="700" fill="#ffffff">Engineering Stack Architecture</text>
    <text x="88" y="99" font-size="13" fill="#aeb8d8" letter-spacing="2.1">ACTIVE FOUNDATION &#8226; STRUCTURED LEARNING PIPELINE</text>

    <rect x="1114" y="50" width="194" height="38" rx="19" fill="#0b1020" stroke="#8b5cf6" stroke-opacity="0.58"/>
    <circle cx="1140" cy="69" r="6" fill="#7dd3fc" filter="url(#glow)">
      <animate attributeName="r" values="4.5;7.5;4.5" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <text x="1161" y="74" font-size="13" font-weight="700" fill="#d8ddff">FOUNDATION ACTIVE</text>
  </g>

  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <text x="88" y="151" font-size="13" fill="#fda4af" letter-spacing="2">CURRENT DEVELOPMENT FOUNDATION</text>
    <text x="88" y="181" font-size="21" font-weight="700" fill="#ffffff">Environment &#8594; Workspace &#8594; Language &#8594; Version Control &#8594; Portfolio</text>
  </g>

  <line x1="150" y1="238" x2="1248" y2="238" stroke="url(#flow)" stroke-width="2.4" stroke-linecap="round" opacity="0.62" filter="url(#soft)"/>
  <line x1="150" y1="238" x2="1248" y2="238" stroke="url(#flow)" stroke-width="0.9" stroke-dasharray="8 15" opacity="0.80">
    <animate attributeName="stroke-dashoffset" values="0;-250" dur="16s" repeatCount="indefinite"/>
  </line>

  <circle cx="150" cy="238" r="5.5" fill="#ffffff" filter="url(#glow)">
    <animate attributeName="cx" values="150;1248" dur="10s" repeatCount="indefinite"/>
  </circle>

  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <g transform="translate(76 201)">
      <rect width="208" height="96" rx="18" fill="url(#active)" stroke="#60a5fa" stroke-opacity="0.50"/>
      <rect x="15" y="13" width="74" height="22" rx="11" fill="#0b2947"/>
      <text x="52" y="28" text-anchor="middle" font-size="9.5" font-weight="700" fill="#93c5fd">ENVIRONMENT</text>
      <text x="16" y="61" font-size="21" font-weight="700" fill="#ffffff">Windows</text>
      <text x="16" y="82" font-size="12" fill="#bfdbfe">Current operating system</text>
    </g>

    <g transform="translate(338 201)">
      <rect width="208" height="96" rx="18" fill="url(#active)" stroke="#60a5fa" stroke-opacity="0.50"/>
      <rect x="15" y="13" width="70" height="22" rx="11" fill="#0b2947"/>
      <text x="50" y="28" text-anchor="middle" font-size="9.5" font-weight="700" fill="#93c5fd">WORKSPACE</text>
      <text x="16" y="61" font-size="21" font-weight="700" fill="#ffffff">VS Code</text>
      <text x="16" y="82" font-size="12" fill="#bfdbfe">Editing and debugging</text>
    </g>

    <g transform="translate(596 191)">
      <rect width="208" height="116" rx="20" fill="url(#active)" stroke="#c084fc" stroke-width="2" filter="url(#glow)"/>
      <rect x="16" y="14" width="92" height="23" rx="11.5" fill="#2b1747"/>
      <text x="62" y="29.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#d8b4fe">CORE LANGUAGE</text>
      <text x="17" y="70" font-size="27" font-weight="800" fill="#ffffff">Python</text>
      <text x="17" y="93" font-size="12" fill="#d8ddff">Logic &#8226; Automation &#8226; AI</text>
      <rect x="17" y="103" width="174" height="3" rx="1.5" fill="url(#flow)">
        <animate attributeName="opacity" values="0.45;1;0.45" dur="3.8s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g transform="translate(854 201)">
      <rect width="208" height="96" rx="18" fill="url(#active)" stroke="#fb7185" stroke-opacity="0.50"/>
      <rect x="15" y="13" width="100" height="22" rx="11" fill="#3b1224"/>
      <text x="65" y="28" text-anchor="middle" font-size="9.2" font-weight="700" fill="#fda4af">VERSION CONTROL</text>
      <text x="16" y="61" font-size="21" font-weight="700" fill="#ffffff">Git</text>
      <text x="16" y="82" font-size="12" fill="#fecdd3">Track code changes</text>
    </g>

    <g transform="translate(1116 201)">
      <rect width="208" height="96" rx="18" fill="url(#active)" stroke="#c084fc" stroke-opacity="0.50"/>
      <rect x="15" y="13" width="78" height="22" rx="11" fill="#2b1747"/>
      <text x="54" y="28" text-anchor="middle" font-size="9.5" font-weight="700" fill="#d8b4fe">PUBLISHING</text>
      <text x="16" y="61" font-size="21" font-weight="700" fill="#ffffff">GitHub</text>
      <text x="16" y="82" font-size="12" fill="#e9d5ff">Projects and collaboration</text>
    </g>
  </g>

  <g font-family="Segoe UI, Inter, Arial, sans-serif" text-anchor="middle">
    <text x="700" y="337" font-size="11" fill="#c4b5fd" letter-spacing="1.6">NEXT LEARNING PIPELINE</text>
  </g>

  <path d="M700 310 V354" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" opacity="0.72"/>
  <circle cx="700" cy="354" r="7" fill="#c084fc" filter="url(#glow)">
    <animate attributeName="r" values="5;9;5" dur="3.6s" repeatCount="indefinite"/>
  </circle>

  <path d="M700 354 C650 386 490 397 270 424" fill="none" stroke="#60a5fa" stroke-width="1.9" stroke-linecap="round" opacity="0.62"/>
  <path d="M700 354 V424" fill="none" stroke="#c084fc" stroke-width="1.9" stroke-linecap="round" opacity="0.68"/>
  <path d="M700 354 C750 386 910 397 1130 424" fill="none" stroke="#fb7185" stroke-width="1.9" stroke-linecap="round" opacity="0.62"/>

  <circle cx="700" cy="354" r="5.2" fill="#ffffff" filter="url(#glow)">
    <animate attributeName="cx" values="700;700;630;520;390;270" keyTimes="0;0.18;0.38;0.60;0.82;1" dur="6.4s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="354;370;388;397;405;424" keyTimes="0;0.18;0.38;0.60;0.82;1" dur="6.4s" begin="1.2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="700" cy="354" r="5.2" fill="#ffffff" filter="url(#glow)">
    <animate attributeName="cy" values="354;424" dur="5.8s" begin="1.9s" repeatCount="indefinite"/>
  </circle>

  <circle cx="700" cy="354" r="5.2" fill="#ffffff" filter="url(#glow)">
    <animate attributeName="cx" values="700;700;770;880;1010;1130" keyTimes="0;0.18;0.38;0.60;0.82;1" dur="6.4s" begin="2.6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="354;370;388;397;405;424" keyTimes="0;0.18;0.38;0.60;0.82;1" dur="6.4s" begin="2.6s" repeatCount="indefinite"/>
  </circle>

  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <g transform="translate(72 420)">
      <rect width="392" height="180" rx="22" fill="url(#dataLayer)" stroke="#60a5fa" stroke-opacity="0.50"/>
      <circle cx="34" cy="36" r="7" fill="#60a5fa" filter="url(#glow)">
        <animate attributeName="opacity" values="0.45;1;0.45" dur="3.8s" repeatCount="indefinite"/>
      </circle>
      <text x="56" y="32" font-size="12" fill="#93c5fd" letter-spacing="1.8">DATA LAYER</text>
      <text x="28" y="73" font-size="22" font-weight="700" fill="#ffffff">NumPy &#8226; Pandas &#8226; Jupyter</text>
      <text x="28" y="104" font-size="14" fill="#cbd5e1">Numerical computing, data analysis,</text>
      <text x="28" y="126" font-size="14" fill="#cbd5e1">cleaning, exploration, and notebooks.</text>
      <rect x="28" y="145" width="90" height="26" rx="13" fill="#0d3558"/>
      <text x="73" y="162.5" text-anchor="middle" font-size="11" font-weight="700" fill="#bfdbfe">NEXT</text>
    </g>

    <g transform="translate(504 420)">
      <rect width="392" height="180" rx="22" fill="url(#mlLayer)" stroke="#c084fc" stroke-opacity="0.52"/>
      <circle cx="34" cy="36" r="7" fill="#c084fc" filter="url(#glow)">
        <animate attributeName="r" values="5;9;5" dur="3.5s" begin="-1s" repeatCount="indefinite"/>
      </circle>
      <text x="56" y="32" font-size="12" fill="#d8b4fe" letter-spacing="1.8">MACHINE LEARNING LAYER</text>
      <text x="28" y="73" font-size="22" font-weight="700" fill="#ffffff">Scikit-learn</text>
      <text x="28" y="104" font-size="14" fill="#cbd5e1">Preprocessing, classical models,</text>
      <text x="28" y="126" font-size="14" fill="#cbd5e1">evaluation, pipelines, and prediction.</text>
      <rect x="28" y="145" width="105" height="26" rx="13" fill="#2b1747"/>
      <text x="80.5" y="162.5" text-anchor="middle" font-size="11" font-weight="700" fill="#e9d5ff">PLANNED</text>
    </g>

    <g transform="translate(936 420)">
      <rect width="392" height="180" rx="22" fill="url(#dlLayer)" stroke="#fb7185" stroke-opacity="0.52"/>
      <circle cx="34" cy="36" r="7" fill="#fb7185" filter="url(#glow)">
        <animate attributeName="opacity" values="0.48;1;0.48" dur="3.7s" begin="-1.4s" repeatCount="indefinite"/>
      </circle>
      <text x="56" y="32" font-size="12" fill="#fda4af" letter-spacing="1.8">DEEP LEARNING LAYER</text>
      <text x="28" y="73" font-size="22" font-weight="700" fill="#ffffff">PyTorch &#8226; TensorFlow</text>
      <text x="28" y="104" font-size="14" fill="#cbd5e1">Neural networks, experimentation,</text>
      <text x="28" y="126" font-size="14" fill="#cbd5e1">training, deployment, and AI systems.</text>
      <rect x="28" y="145" width="105" height="26" rx="13" fill="#3b1224"/>
      <text x="80.5" y="162.5" text-anchor="middle" font-size="11" font-weight="700" fill="#fecdd3">PLANNED</text>
    </g>
  </g>

  <line x1="116" y1="622" x2="1284" y2="622" stroke="#ffffff" stroke-opacity="0.10"/>
  <text x="700" y="646" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="11.5" fill="#cbd5e1" letter-spacing="0.8">
    FOUNDATION &#8594; DATA &#8594; MACHINE LEARNING &#8594; DEEP LEARNING &#8594; INTELLIGENT SYSTEMS
  </text>
</svg>
