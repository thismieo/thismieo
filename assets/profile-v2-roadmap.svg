<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 340" role="img" aria-labelledby="title desc">
  <title id="title">Engineering Path</title>
  <desc id="desc">Four-stage learning path from programming foundations through data, machine learning, and advanced AI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#030712"/>
      <stop offset="0.55" stop-color="#07101f"/>
      <stop offset="1" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.34" stop-color="#67e8f9"/>
      <stop offset="0.68" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="1.5" y="1.5" width="1597" height="337" rx="26" fill="url(#bg)" stroke="url(#flow)" stroke-opacity="0.38" stroke-width="3"/>

  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <text x="66" y="54" fill="#ffffff" font-size="30" font-weight="740">Engineering Path</text>
    <text x="66" y="80" fill="#7f8da6" font-size="13" letter-spacing="2">A DISCIPLINED ROADMAP — CURRENT SKILLS FIRST, ADVANCED SYSTEMS LATER</text>
  </g>

  <line x1="185" y1="160" x2="1415" y2="160" stroke="#ffffff" stroke-opacity="0.10" stroke-width="4"/>
  <line x1="185" y1="160" x2="575" y2="160" stroke="url(#flow)" stroke-width="4" filter="url(#glow)"/>
  <circle r="5" fill="#ffffff" filter="url(#glow)">
    <animateMotion dur="7s" repeatCount="indefinite" path="M185 160H1415"/>
  </circle>

  <g font-family="Segoe UI, Inter, Arial, sans-serif" text-anchor="middle">
    <g transform="translate(185 160)">
      <circle r="34" fill="#071a18" stroke="#34d399" stroke-width="2.4"/>
      <circle r="7" fill="#34d399" filter="url(#glow)"/>
      <text y="5" fill="#ffffff" font-size="14" font-weight="800">01</text>
      <text y="76" fill="#86efac" font-size="12" font-weight="800" letter-spacing="2">ACTIVE</text>
      <text y="106" fill="#ffffff" font-size="22" font-weight="720">Foundation</text>
      <text y="132" fill="#94a3b8" font-size="14">Python · Algorithms · Git</text>
    </g>

    <g transform="translate(595 160)">
      <circle r="34" fill="#071522" stroke="#67e8f9" stroke-width="2.4"/>
      <circle r="7" fill="#67e8f9" filter="url(#glow)"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
      <text y="5" fill="#ffffff" font-size="14" font-weight="800">02</text>
      <text y="76" fill="#a5f3fc" font-size="12" font-weight="800" letter-spacing="2">NEXT</text>
      <text y="106" fill="#ffffff" font-size="22" font-weight="720">Data</text>
      <text y="132" fill="#94a3b8" font-size="14">NumPy · Pandas · Visualization</text>
    </g>

    <g transform="translate(1005 160)">
      <circle r="34" fill="#12101d" stroke="#c084fc" stroke-opacity="0.72" stroke-width="2.2"/>
      <circle r="6" fill="#c084fc" opacity="0.72"/>
      <text y="5" fill="#ffffff" font-size="14" font-weight="800">03</text>
      <text y="76" fill="#d8b4fe" font-size="12" font-weight="800" letter-spacing="2">PLANNED</text>
      <text y="106" fill="#ffffff" font-size="22" font-weight="720">Machine Learning</text>
      <text y="132" fill="#94a3b8" font-size="14">Models · Evaluation · Projects</text>
    </g>

    <g transform="translate(1415 160)">
      <circle r="34" fill="#160c14" stroke="#fb7185" stroke-opacity="0.62" stroke-width="2.2"/>
      <circle r="6" fill="#fb7185" opacity="0.65"/>
      <text y="5" fill="#ffffff" font-size="14" font-weight="800">04</text>
      <text y="76" fill="#fda4af" font-size="12" font-weight="800" letter-spacing="2">FUTURE</text>
      <text y="106" fill="#ffffff" font-size="22" font-weight="720">Advanced AI</text>
      <text y="132" fill="#94a3b8" font-size="14">DL · NLP · CV · Generative AI</text>
    </g>
  </g>

  <text x="800" y="316" text-anchor="middle" fill="#7f8da6" font-family="Consolas, JetBrains Mono, monospace" font-size="14" letter-spacing="1.4">learn → practice → build → document → improve</text>
</svg>
