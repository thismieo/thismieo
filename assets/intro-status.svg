<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 230" role="img" aria-labelledby="title desc">
  <title id="title">Current AI engineering journey status</title>
  <desc id="desc">Animated status panel showing current mode, focus, and next target.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090711"/>
      <stop offset="55%" stop-color="#0c1324"/>
      <stop offset="100%" stop-color="#160a18"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb4d83" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb4d83" stop-opacity="0"/>
      <stop offset="45%" stop-color="#e879f9"/>
      <stop offset="55%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="1.5" y="1.5" width="1597" height="227" rx="24" fill="url(#bg)" stroke="url(#border)" stroke-width="3"/>

  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <g transform="translate(62 42)">
      <circle cx="20" cy="20" r="7" fill="#fb7185" filter="url(#glow)">
        <animate attributeName="r" values="5;9;5" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <text x="45" y="17" font-size="14" fill="#fda4af" letter-spacing="2">CURRENT MODE</text>
      <text x="45" y="47" font-size="25" font-weight="700" fill="#ffffff">Learning &amp; Building</text>
    </g>

    <g transform="translate(555 42)">
      <circle cx="20" cy="20" r="7" fill="#c084fc" filter="url(#glow)">
        <animate attributeName="opacity" values="0.45;1;0.45" dur="3.8s" repeatCount="indefinite"/>
      </circle>
      <text x="45" y="17" font-size="14" fill="#d8b4fe" letter-spacing="2">ACTIVE FOCUS</text>
      <text x="45" y="47" font-size="25" font-weight="700" fill="#ffffff">Python • Algorithms • Git</text>
    </g>

    <g transform="translate(1130 42)">
      <circle cx="20" cy="20" r="7" fill="#60a5fa" filter="url(#glow)">
        <animate attributeName="r" values="5;9;5" dur="3.6s" begin="-1.2s" repeatCount="indefinite"/>
      </circle>
      <text x="45" y="17" font-size="14" fill="#93c5fd" letter-spacing="2">NEXT TARGET</text>
      <text x="45" y="47" font-size="25" font-weight="700" fill="#ffffff">Data Analysis</text>
    </g>

    <rect x="62" y="122" width="1476" height="1" fill="#ffffff" opacity="0.08"/>

    <text x="800" y="169" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="25" font-weight="600" fill="#d8ddff">progress = consistency × practice × time</text>
    <text x="800" y="201" text-anchor="middle" font-size="14" fill="#94a3b8" letter-spacing="2.2">ONE CONCEPT • ONE PROJECT • ONE COMMIT AT A TIME</text>
  </g>

  <rect x="90" y="215" width="1420" height="2" rx="1" fill="#1e293b"/>
  <rect x="90" y="215" width="240" height="2" rx="1" fill="url(#scan)" filter="url(#glow)">
    <animate attributeName="x" values="90;1270;90" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>