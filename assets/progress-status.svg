<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 440" role="img" aria-labelledby="title desc">
  <title id="title">Progress Status Dashboard</title>
  <desc id="desc">Animated dashboard showing current learning, completed foundation, and next targets.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0713"/>
      <stop offset="58%" stop-color="#111a2d"/>
      <stop offset="100%" stop-color="#30101f"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="maroon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7f1d3f"/>
      <stop offset="100%" stop-color="#c2416c"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="440" rx="26" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1397" height="437" rx="25" fill="none" stroke="#8b5cf6" stroke-opacity="0.34" stroke-width="3"/>

  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <text x="700" y="60" text-anchor="middle" font-size="34" font-weight="700" fill="#ffffff">Progress Status</text>
    <text x="700" y="91" text-anchor="middle" font-size="16" fill="#a5b4fc" letter-spacing="2">LEARN • BUILD • DOCUMENT • IMPROVE</text>

    <g transform="translate(55 125)">
      <rect width="410" height="250" rx="22" fill="#12101f" stroke="#8b5cf6" stroke-opacity="0.55"/>
      <circle cx="48" cy="48" r="25" fill="#21143c" stroke="#a78bfa" stroke-width="2" filter="url(#glow)"/>
      <text x="48" y="57" text-anchor="middle" font-size="25" font-family="Segoe UI Emoji">🔄</text>
      <text x="88" y="44" font-size="24" font-weight="700" fill="#ffffff">Currently Learning</text>
      <text x="88" y="70" font-size="15" fill="#c4b5fd">Active focus</text>
      <text x="28" y="120" font-size="18" fill="#f8fafc">Python Fundamentals</text>
      <text x="28" y="151" font-size="18" fill="#f8fafc">Algorithms &amp; Problem Solving</text>
      <text x="28" y="182" font-size="18" fill="#f8fafc">Git &amp; GitHub Workflow</text>
      <rect x="28" y="210" width="354" height="12" rx="6" fill="#252033"/>
      <rect x="28" y="210" width="0" height="12" rx="6" fill="url(#purple)">
        <animate attributeName="width" from="0" to="255" dur="1.8s" fill="freeze"/>
      </rect>
      <text x="382" y="205" text-anchor="end" font-size="14" fill="#c4b5fd">Foundation phase</text>
    </g>

    <g transform="translate(495 125)">
      <rect width="410" height="250" rx="22" fill="#0f1722" stroke="#22d3ee" stroke-opacity="0.55"/>
      <circle cx="48" cy="48" r="25" fill="#102833" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
      <text x="48" y="57" text-anchor="middle" font-size="25" font-family="Segoe UI Emoji">✅</text>
      <text x="88" y="44" font-size="24" font-weight="700" fill="#ffffff">Foundation Built</text>
      <text x="88" y="70" font-size="15" fill="#67e8f9">Completed setup</text>
      <text x="28" y="120" font-size="18" fill="#f8fafc">Development Environment</text>
      <text x="28" y="151" font-size="18" fill="#f8fafc">Professional GitHub Profile</text>
      <text x="28" y="182" font-size="18" fill="#f8fafc">Version Control Basics</text>
      <rect x="28" y="210" width="354" height="12" rx="6" fill="#20303a"/>
      <rect x="28" y="210" width="0" height="12" rx="6" fill="url(#cyan)">
        <animate attributeName="width" from="0" to="354" dur="1.8s" fill="freeze"/>
      </rect>
      <text x="382" y="205" text-anchor="end" font-size="14" fill="#67e8f9">Ready</text>
    </g>

    <g transform="translate(935 125)">
      <rect width="410" height="250" rx="22" fill="#1c1018" stroke="#c2416c" stroke-opacity="0.55"/>
      <circle cx="48" cy="48" r="25" fill="#351421" stroke="#c2416c" stroke-width="2" filter="url(#glow)"/>
      <text x="48" y="57" text-anchor="middle" font-size="25" font-family="Segoe UI Emoji">⏳</text>
      <text x="88" y="44" font-size="24" font-weight="700" fill="#ffffff">Next Target</text>
      <text x="88" y="70" font-size="15" fill="#f9a8d4">Upcoming stage</text>
      <text x="28" y="120" font-size="18" fill="#f8fafc">NumPy</text>
      <text x="28" y="151" font-size="18" fill="#f8fafc">Pandas</text>
      <text x="28" y="182" font-size="18" fill="#f8fafc">Data Analysis</text>
      <rect x="28" y="210" width="354" height="12" rx="6" fill="#35232b"/>
      <rect x="28" y="210" width="0" height="12" rx="6" fill="url(#maroon)">
        <animate attributeName="width" from="0" to="112" dur="1.8s" fill="freeze"/>
      </rect>
      <text x="382" y="205" text-anchor="end" font-size="14" fill="#f9a8d4">Queued</text>
    </g>
  </g>
</svg>
