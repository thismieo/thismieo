<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 430" role="img" aria-labelledby="title desc">
  <title id="title">Progress Status Dashboard</title>
  <desc id="desc">Calm animated dashboard showing current learning, completed foundations, and next targets.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08060f"/>
      <stop offset="55%" stop-color="#0b1425"/>
      <stop offset="100%" stop-color="#170a17"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb4d83" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#c084fc"/></linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#67e8f9"/></linearGradient>
    <linearGradient id="maroon" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#9f1747"/><stop offset="1" stop-color="#fb7185"/></linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1400" height="430" rx="24" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1397" height="427" rx="23" fill="none" stroke="url(#border)" stroke-width="3"/>

  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <text x="700" y="58" text-anchor="middle" font-size="33" font-weight="700" fill="#ffffff">Progress Status</text>
    <text x="700" y="88" text-anchor="middle" font-size="14" fill="#aeb8d8" letter-spacing="2.4">LEARN • BUILD • DOCUMENT • IMPROVE</text>

    <g transform="translate(45 118)">
      <rect width="420" height="255" rx="20" fill="#0e0d19" stroke="#8b5cf6" stroke-opacity="0.42"/>
      <circle cx="42" cy="42" r="7" fill="#c084fc" filter="url(#glow)"><animate attributeName="r" values="5;9;5" dur="3.4s" repeatCount="indefinite"/></circle>
      <text x="66" y="39" font-size="13" fill="#d8b4fe" letter-spacing="1.8">CURRENTLY LEARNING</text>
      <text x="28" y="84" font-size="25" font-weight="700" fill="#ffffff">Foundation Phase</text>
      <text x="28" y="124" font-size="17" fill="#e2e8f0">Python Fundamentals</text>
      <text x="28" y="154" font-size="17" fill="#e2e8f0">Algorithms &amp; Problem Solving</text>
      <text x="28" y="184" font-size="17" fill="#e2e8f0">Git &amp; GitHub Workflow</text>
      <rect x="28" y="214" width="364" height="9" rx="4.5" fill="#211d2d"/>
      <rect x="28" y="214" width="262" height="9" rx="4.5" fill="url(#purple)">
        <animate attributeName="opacity" values="0.62;1;0.62" dur="3.5s" repeatCount="indefinite"/>
      </rect>
      <circle cx="290" cy="218.5" r="4.5" fill="#e9d5ff" filter="url(#glow)"><animate attributeName="r" values="3.5;6;3.5" dur="3.5s" repeatCount="indefinite"/></circle>
      <text x="392" y="244" text-anchor="end" font-size="13" fill="#c4b5fd">ACTIVE</text>
    </g>

    <g transform="translate(490 118)">
      <rect width="420" height="255" rx="20" fill="#0b121c" stroke="#38bdf8" stroke-opacity="0.42"/>
      <circle cx="42" cy="42" r="7" fill="#60a5fa" filter="url(#glow)"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.8s" repeatCount="indefinite"/></circle>
      <text x="66" y="39" font-size="13" fill="#93c5fd" letter-spacing="1.8">FOUNDATION BUILT</text>
      <text x="28" y="84" font-size="25" font-weight="700" fill="#ffffff">Environment Ready</text>
      <text x="28" y="124" font-size="17" fill="#e2e8f0">Development Environment</text>
      <text x="28" y="154" font-size="17" fill="#e2e8f0">Professional GitHub Profile</text>
      <text x="28" y="184" font-size="17" fill="#e2e8f0">Version Control Basics</text>
      <rect x="28" y="214" width="364" height="9" rx="4.5" fill="#172534"/>
      <rect x="28" y="214" width="364" height="9" rx="4.5" fill="url(#cyan)">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
      </rect>
      <circle cx="392" cy="218.5" r="4.5" fill="#dbeafe" filter="url(#glow)"><animate attributeName="opacity" values="0.45;1;0.45" dur="4s" repeatCount="indefinite"/></circle>
      <text x="392" y="244" text-anchor="end" font-size="13" fill="#7dd3fc">READY</text>
    </g>

    <g transform="translate(935 118)">
      <rect width="420" height="255" rx="20" fill="#160c14" stroke="#fb7185" stroke-opacity="0.42"/>
      <circle cx="42" cy="42" r="7" fill="#fb7185" filter="url(#glow)"><animate attributeName="r" values="5;9;5" dur="3.6s" begin="-1.4s" repeatCount="indefinite"/></circle>
      <text x="66" y="39" font-size="13" fill="#fda4af" letter-spacing="1.8">NEXT TARGET</text>
      <text x="28" y="84" font-size="25" font-weight="700" fill="#ffffff">Data Foundations</text>
      <text x="28" y="124" font-size="17" fill="#e2e8f0">NumPy</text>
      <text x="28" y="154" font-size="17" fill="#e2e8f0">Pandas</text>
      <text x="28" y="184" font-size="17" fill="#e2e8f0">Data Analysis</text>
      <rect x="28" y="214" width="364" height="9" rx="4.5" fill="#2a1720"/>
      <rect x="28" y="214" width="118" height="9" rx="4.5" fill="url(#maroon)">
        <animate attributeName="width" values="105;126;105" dur="5s" repeatCount="indefinite"/>
      </rect>
      <circle cx="146" cy="218.5" r="4.5" fill="#ffe4e6" filter="url(#glow)"><animate attributeName="cx" values="133;154;133" dur="5s" repeatCount="indefinite"/></circle>
      <text x="392" y="244" text-anchor="end" font-size="13" fill="#fda4af">UP NEXT</text>
    </g>

    <text x="700" y="407" text-anchor="middle" font-size="14" fill="#64748b" letter-spacing="1.6">PROGRESS IS MEASURED BY CONSISTENCY, NOT SPEED</text>
  </g>
</svg>