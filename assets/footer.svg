<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 330" role="img" aria-labelledby="title desc">
  <title id="title">Thanks for visiting Mohammed Muayad's profile</title>
  <desc id="desc">Calm animated closing banner with moving neural signals and soft waves.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08060f"/>
      <stop offset="55%" stop-color="#0a1426"/>
      <stop offset="100%" stop-color="#170a17"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb4d83" stop-opacity="0"/>
      <stop offset="28%" stop-color="#d946ef"/>
      <stop offset="52%" stop-color="#a78bfa"/>
      <stop offset="76%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#be185d" stop-opacity="0"/>
      <stop offset="35%" stop-color="#db2777" stop-opacity="0.22"/>
      <stop offset="68%" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-90%" y="-90%" width="280%" height="280%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1600" height="330" rx="26" fill="url(#bg)"/>

  <path id="signal" d="M80 92 C280 34 440 142 620 92 S960 34 1150 98 S1390 130 1520 84" fill="none" stroke="url(#g)" stroke-width="1.7" stroke-linecap="round" opacity="0.72"/>
  <path d="M80 92 C280 34 440 142 620 92 S960 34 1150 98 S1390 130 1520 84" fill="none" stroke="url(#g)" stroke-width="0.9" stroke-dasharray="8 14" opacity="0.7">
    <animate attributeName="stroke-dashoffset" values="0;-260" dur="16s" repeatCount="indefinite"/>
  </path>

  <g filter="url(#glow)">
    <circle r="4" fill="#fb7185"><animateMotion dur="9s" repeatCount="indefinite"><mpath href="#signal"/></animateMotion></circle>
    <circle r="4" fill="#c084fc"><animateMotion dur="11s" begin="-4s" repeatCount="indefinite"><mpath href="#signal"/></animateMotion></circle>
    <circle r="4" fill="#60a5fa"><animateMotion dur="13s" begin="-8s" repeatCount="indefinite"><mpath href="#signal"/></animateMotion></circle>
  </g>

  <g fill="#e8e7ff" filter="url(#glow)">
    <circle cx="230" cy="72" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="76" r="4"><animate attributeName="r" values="3;6;3" dur="4.8s" repeatCount="indefinite"/></circle>
    <circle cx="1370" cy="94" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.5s" begin="-1.8s" repeatCount="indefinite"/></circle>
  </g>

  <g font-family="Segoe UI, Inter, Arial, sans-serif" text-anchor="middle">
    <text x="800" y="165" font-size="41" font-weight="700" fill="#ffffff">Thanks for Visiting My Profile</text>
    <text x="800" y="207" font-size="21" fill="#d8ddff">Always Learning • Always Building • Always Improving</text>
    <text x="800" y="249" font-size="15" fill="#93a4c5" letter-spacing="2">MOHAMMED MUAYAD · AI ENGINEERING JOURNEY</text>
  </g>

  <path d="M0 260 C280 220 500 318 800 270 S1280 220 1600 282 V330 H0 Z" fill="url(#wave)" opacity="0.65">
    <animate attributeName="d" dur="15s" repeatCount="indefinite"
      values="M0 260 C280 220 500 318 800 270 S1280 220 1600 282 V330 H0 Z;
              M0 282 C300 326 540 234 840 276 S1300 322 1600 258 V330 H0 Z;
              M0 260 C280 220 500 318 800 270 S1280 220 1600 282 V330 H0 Z"/>
  </path>
</svg>