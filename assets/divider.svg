<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 86" role="img" aria-label="Animated neural section divider">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb4d83" stop-opacity="0"/>
      <stop offset="24%" stop-color="#d946ef" stop-opacity="0.65"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="76%" stop-color="#60a5fa" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <path id="line" d="M70 43 C300 18 470 67 690 43 S1110 18 1530 43" fill="none" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.72"/>
  <path d="M70 43 C300 18 470 67 690 43 S1110 18 1530 43" fill="none" stroke="url(#g)" stroke-width="0.9" stroke-linecap="round" stroke-dasharray="7 14" opacity="0.65">
    <animate attributeName="stroke-dashoffset" values="0;-260" dur="16s" repeatCount="indefinite"/>
  </path>

  <g filter="url(#glow)">
    <circle r="4" fill="#fb7185"><animateMotion dur="9s" repeatCount="indefinite"><mpath href="#line"/></animateMotion></circle>
    <circle r="4" fill="#c084fc"><animateMotion dur="11s" begin="-4s" repeatCount="indefinite"><mpath href="#line"/></animateMotion></circle>
    <circle r="4" fill="#60a5fa"><animateMotion dur="13s" begin="-8s" repeatCount="indefinite"><mpath href="#line"/></animateMotion></circle>
  </g>

  <g fill="#e8e7ff" filter="url(#glow)">
    <circle cx="330" cy="36" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="43" r="4"><animate attributeName="r" values="3;6;3" dur="4.8s" repeatCount="indefinite"/></circle>
    <circle cx="1260" cy="37" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.4s" begin="-1.8s" repeatCount="indefinite"/></circle>
  </g>
</svg>