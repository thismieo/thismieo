<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Mohammed Muayad — AI Engineering Student</title>
  <desc id="desc">Animated luxury AI banner with maroon, violet, and cyan glows, elegant branching neural networks, and flowing waves.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07040f"/>
      <stop offset="28%" stop-color="#17102c"/>
      <stop offset="62%" stop-color="#0b2948"/>
      <stop offset="100%" stop-color="#56162f"/>
    </linearGradient>

    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="48%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#d14f7b"/>
    </linearGradient>

    <linearGradient id="leftNet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b79cff"/>
      <stop offset="52%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <linearGradient id="rightNet" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4a1bd"/>
      <stop offset="50%" stop-color="#d14f7b"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>

    <linearGradient id="waveA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="44%" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="waveB" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#d14f7b" stop-opacity="0"/>
      <stop offset="45%" stop-color="#d14f7b" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.76"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.56"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="maroonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d14f7b" stop-opacity="0.86"/>
      <stop offset="55%" stop-color="#8b1e3f" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#8b1e3f" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>

    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="32"/>
    </filter>

    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="30" fill="url(#bg)"/>
  <rect width="1600" height="520" rx="30" fill="url(#grid)"/>

  <ellipse cx="430" cy="155" rx="430" ry="190" fill="url(#purpleGlow)" filter="url(#blur)">
    <animate attributeName="cx" values="390;490;390" dur="12s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="930" cy="285" rx="350" ry="155" fill="url(#cyanGlow)" filter="url(#blur)">
    <animate attributeName="cy" values="255;315;255" dur="11s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="1335" cy="255" rx="360" ry="210" fill="url(#maroonGlow)" filter="url(#blur)">
    <animate attributeName="rx" values="330;395;330" dur="9.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="235;285;235" dur="12.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Elegant branching neural system: left -->
  <g fill="none" stroke="url(#leftNet)" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <path d="M42 24 C118 82 102 145 150 205 C190 255 174 330 228 414" stroke-width="2.15" opacity="0.78"/>
    <path d="M150 205 C230 165 286 116 374 84 C432 63 476 70 526 102" stroke-width="1.45" opacity="0.66"/>
    <path d="M150 205 C232 222 304 251 382 302 C436 337 474 358 536 362" stroke-width="1.55" opacity="0.69"/>
    <path d="M228 414 C296 378 352 356 428 350 C474 347 510 360 552 392" stroke-width="1.25" opacity="0.56"/>
    <path d="M82 92 C170 104 226 82 300 44" stroke-width="1.2" opacity="0.53"/>
    <path d="M102 300 C182 286 242 300 316 338" stroke-width="1.18" opacity="0.5"/>
    <path d="M374 84 C350 145 356 213 382 302" stroke-width="1.08" opacity="0.45"/>
    <path d="M300 44 C334 102 355 180 356 245" stroke-width="0.95" opacity="0.4"/>

    <path d="M42 24 C118 82 102 145 150 205 C190 255 174 330 228 414" stroke-width="0.95" stroke-dasharray="9 15" opacity="0.72">
      <animate attributeName="stroke-dashoffset" values="0;-260" dur="13s" repeatCount="indefinite"/>
    </path>
    <path d="M150 205 C230 165 286 116 374 84 C432 63 476 70 526 102" stroke-width="0.85" stroke-dasharray="7 14" opacity="0.58">
      <animate attributeName="stroke-dashoffset" values="0;210" dur="15s" repeatCount="indefinite"/>
    </path>
    <path d="M150 205 C232 222 304 251 382 302 C436 337 474 358 536 362" stroke-width="0.85" stroke-dasharray="8 15" opacity="0.62">
      <animate attributeName="stroke-dashoffset" values="0;-230" dur="16s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Elegant branching neural system: right -->
  <g fill="none" stroke="url(#rightNet)" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <path d="M1558 24 C1482 82 1498 145 1450 205 C1410 255 1426 330 1372 414" stroke-width="2.2" opacity="0.84"/>
    <path d="M1450 205 C1370 165 1314 116 1226 84 C1168 63 1124 70 1074 102" stroke-width="1.5" opacity="0.73"/>
    <path d="M1450 205 C1368 222 1296 251 1218 302 C1164 337 1126 358 1064 362" stroke-width="1.6" opacity="0.77"/>
    <path d="M1372 414 C1304 378 1248 356 1172 350 C1126 347 1090 360 1048 392" stroke-width="1.3" opacity="0.63"/>
    <path d="M1518 92 C1430 104 1374 82 1300 44" stroke-width="1.25" opacity="0.6"/>
    <path d="M1498 300 C1418 286 1358 300 1284 338" stroke-width="1.22" opacity="0.57"/>
    <path d="M1226 84 C1250 145 1244 213 1218 302" stroke-width="1.1" opacity="0.5"/>
    <path d="M1300 44 C1266 102 1245 180 1244 245" stroke-width="0.98" opacity="0.45"/>

    <path d="M1558 24 C1482 82 1498 145 1450 205 C1410 255 1426 330 1372 414" stroke-width="0.95" stroke-dasharray="9 15" opacity="0.78">
      <animate attributeName="stroke-dashoffset" values="0;260" dur="13s" repeatCount="indefinite"/>
    </path>
    <path d="M1450 205 C1370 165 1314 116 1226 84 C1168 63 1124 70 1074 102" stroke-width="0.88" stroke-dasharray="7 14" opacity="0.64">
      <animate attributeName="stroke-dashoffset" values="0;-210" dur="15s" repeatCount="indefinite"/>
    </path>
    <path d="M1450 205 C1368 222 1296 251 1218 302 C1164 337 1126 358 1064 362" stroke-width="0.88" stroke-dasharray="8 15" opacity="0.68">
      <animate attributeName="stroke-dashoffset" values="0;230" dur="16s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Refined neural nodes -->
  <g filter="url(#glow)">
    <g fill="#d8ccff">
      <circle cx="42" cy="24" r="4"/>
      <circle cx="82" cy="92" r="3.6"/>
      <circle cx="150" cy="205" r="6.2"/>
      <circle cx="102" cy="300" r="3.7"/>
      <circle cx="228" cy="414" r="5"/>
      <circle cx="300" cy="44" r="3.8"/>
      <circle cx="374" cy="84" r="4.5"/>
      <circle cx="356" cy="245" r="3.6"/>
      <circle cx="382" cy="302" r="5"/>
      <circle cx="526" cy="102" r="4.1"/>
      <circle cx="536" cy="362" r="4.2"/>
      <circle cx="552" cy="392" r="3.6"/>
    </g>

    <g fill="#f6acc5">
      <circle cx="1558" cy="24" r="4"/>
      <circle cx="1518" cy="92" r="3.6"/>
      <circle cx="1450" cy="205" r="6.2"/>
      <circle cx="1498" cy="300" r="3.7"/>
      <circle cx="1372" cy="414" r="5"/>
      <circle cx="1300" cy="44" r="3.8"/>
      <circle cx="1226" cy="84" r="4.5"/>
      <circle cx="1244" cy="245" r="3.6"/>
      <circle cx="1218" cy="302" r="5"/>
      <circle cx="1074" cy="102" r="4.1"/>
      <circle cx="1064" cy="362" r="4.2"/>
      <circle cx="1048" cy="392" r="3.6"/>
    </g>
  </g>

  <!-- Primary pulse hubs -->
  <g fill="none" filter="url(#glow)">
    <circle cx="150" cy="205" r="12" stroke="#67e8f9" stroke-width="1.2" opacity="0.75">
      <animate attributeName="r" values="9;18;9" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.08;0.7" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1450" cy="205" r="12" stroke="#f6acc5" stroke-width="1.2" opacity="0.8">
      <animate attributeName="r" values="9;18;9" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.75;0.08;0.75" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="382" cy="302" r="8" stroke="#a78bfa" stroke-width="1" opacity="0.55">
      <animate attributeName="r" values="7;13;7" dur="4.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1218" cy="302" r="8" stroke="#d14f7b" stroke-width="1" opacity="0.6">
      <animate attributeName="r" values="7;13;7" dur="4.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g font-family="Segoe UI, Inter, Arial, sans-serif" text-anchor="middle">
    <text x="800" y="205" font-size="70" font-weight="750" fill="#ffffff" letter-spacing="1">Mohammed Muayad</text>
    <text x="800" y="263" font-size="30" font-weight="600" fill="#dedaff" letter-spacing="2">AI Engineering Student</text>
    <rect x="492" y="297" width="616" height="2" fill="url(#neon)" opacity="0.95">
      <animate attributeName="opacity" values="0.38;1;0.38" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="800" y="350" font-size="28" font-weight="500" fill="#f8fafc">Building the Future with Code &amp; Intelligence</text>
  </g>

  <path d="M0 430 C250 375 430 500 690 445 S1110 365 1600 455 V520 H0 Z" fill="url(#waveA)" opacity="0.62">
    <animate attributeName="d" dur="10s" repeatCount="indefinite"
      values="M0 430 C250 375 430 500 690 445 S1110 365 1600 455 V520 H0 Z;
              M0 455 C260 505 460 380 710 450 S1130 505 1600 420 V520 H0 Z;
              M0 430 C250 375 430 500 690 445 S1110 365 1600 455 V520 H0 Z"/>
  </path>

  <path d="M0 470 C285 420 500 510 770 468 S1260 410 1600 475 V520 H0 Z" fill="url(#waveB)" opacity="0.82">
    <animate attributeName="d" dur="13s" repeatCount="indefinite"
      values="M0 470 C285 420 500 510 770 468 S1260 410 1600 475 V520 H0 Z;
              M0 450 C320 505 530 420 820 470 S1270 515 1600 450 V520 H0 Z;
              M0 470 C285 420 500 510 770 468 S1260 410 1600 475 V520 H0 Z"/>
  </path>
</svg>
