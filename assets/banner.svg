<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 580" role="img" aria-labelledby="title desc">
  <title id="title">Mohammed Muayad — AI Engineering Student</title>
  <desc id="desc">Animated AI profile banner based on a refined neural mesh design, with maroon and blue networks, distributed moving particles, circular signal hubs, and flowing waves.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07040f"/>
      <stop offset="28%" stop-color="#140a22"/>
      <stop offset="58%" stop-color="#090d21"/>
      <stop offset="100%" stop-color="#07142c"/>
    </linearGradient>

    <radialGradient id="maroonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b21f52" stop-opacity="0.62"/>
      <stop offset="52%" stop-color="#6f1235" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#39091d" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="violetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.43"/>
      <stop offset="58%" stop-color="#3b1a74" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1c0d38" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.50"/>
      <stop offset="55%" stop-color="#123a89" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#071a44" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="leftNet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3c77"/>
      <stop offset="55%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <linearGradient id="rightNet" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <linearGradient id="centerAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0"/>
      <stop offset="36%" stop-color="#e879f9"/>
      <stop offset="64%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="waveA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#be185d" stop-opacity="0"/>
      <stop offset="30%" stop-color="#db2777" stop-opacity="0.36"/>
      <stop offset="68%" stop-color="#7c3aed" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="waveB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a21caf" stop-opacity="0"/>
      <stop offset="48%" stop-color="#7c3aed" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" fill="none" stroke="#ffffff" stroke-opacity="0.022" stroke-width="1"/>
    </pattern>

    <filter id="blur" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>

    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="580" rx="32" fill="url(#bg)"/>
  <rect width="1600" height="580" rx="32" fill="url(#grid)"/>

  <ellipse cx="250" cy="280" rx="430" ry="270" fill="url(#maroonGlow)" filter="url(#blur)">
    <animate attributeName="cx" values="210;290;210" dur="13s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="245;285;245" dur="11s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="800" cy="250" rx="360" ry="210" fill="url(#violetGlow)" filter="url(#blur)">
    <animate attributeName="opacity" values="0.55;0.9;0.55" dur="8s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="1360" cy="285" rx="430" ry="275" fill="url(#blueGlow)" filter="url(#blur)">
