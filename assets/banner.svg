    <text x="800" y="302" font-size="30" font-weight="600" fill="#d8d7ff" letter-spacing="6">AI Engineering Student</text>

    <rect x="535" y="333" width="530" height="2.2" rx="1.1" fill="url(#centerAccent)" opacity="0.95">
      <animate attributeName="opacity" values="0.38;1;0.38" dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="width" values="470;530;470" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="x" values="565;535;565" dur="7s" repeatCount="indefinite"/>
