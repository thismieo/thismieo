  <g fill="none" stroke="url(#rightNet)" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)" opacity="0.80">
    <path d="M910 154 C986 128 1026 128 1080 198 S1230 252 1368 154 S1508 82 1600 142" stroke-width="1.6"/>
    <path d="M900 268 C954 256 1004 256 1064 306 S1234 374 1314 270 S1488 190 1600 256" stroke-width="1.4"/>
