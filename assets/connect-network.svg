<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 440" role="img" aria-labelledby="title desc">
  <title id="title">Connect With Mohammed Muayad</title>
  <desc id="desc">Animated contact network linking Gmail, Outlook, Kaggle, Instagram, and GitHub.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08060f"/>
      <stop offset="55%" stop-color="#0b1425"/>
      <stop offset="100%" stop-color="#170a17"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb4d83" stop-opacity="0.24"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.24"/>
    </linearGradient>
    <linearGradient id="link" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="40%" r="68%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.80"/>
      <stop offset="58%" stop-color="#312e81" stop-opacity="0.46"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0.98"/>
    </radialGradient>
    <radialGradient id="pink" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#3b1022" stop-opacity="0.98"/>
    </radialGradient>
    <radialGradient id="blue" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#0f274e" stop-opacity="0.98"/>
    </radialGradient>
    <radialGradient id="violet" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#251140" stop-opacity="0.98"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="orbit" d="M210 220 C320 78 540 65 700 210 C860 65 1080 78 1190 220 C1080 362 860 375 700 230 C540 375 320 362 210 220"/>
  </defs>

  <rect width="1400" height="440" rx="26" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1397" height="437" rx="25" fill="none" stroke="url(#border)" stroke-width="3"/>

  <g font-family="Segoe UI, Inter, Arial, sans-serif" text-anchor="middle">
    <text x="700" y="50" font-size="31" font-weight="750" fill="#ffffff">Connect With Me</text>
    <text x="700" y="77" font-size="13" fill="#aeb8d8" letter-spacing="2.2">COMMUNICATION • DATA • COMMUNITY • JOURNEY</text>
  </g>

  <path d="M210 220 C320 78 540 65 700 210 C860 65 1080 78 1190 220 C1080 362 860 375 700 230 C540 375 320 362 210 220" fill="none" stroke="url(#link)" stroke-width="1.7" stroke-linecap="round" opacity="0.50"/>
  <path d="M210 220 C320 78 540 65 700 210 C860 65 1080 78 1190 220 C1080 362 860 375 700 230 C540 375 320 362 210 220" fill="none" stroke="url(#link)" stroke-width="0.8" stroke-dasharray="7 15" opacity="0.72">
    <animate attributeName="stroke-dashoffset" values="0;-260" dur="18s" repeatCount="indefinite"/>
  </path>
  <circle r="5" fill="#ffffff" filter="url(#glow)">
    <animateMotion dur="14s" repeatCount="indefinite"><mpath href="#orbit"/></animateMotion>
  </circle>
  <circle r="4.5" fill="#d8b4fe" filter="url(#glow)">
    <animateMotion dur="17s" begin="-6s" repeatCount="indefinite"><mpath href="#orbit"/></animateMotion>
  </circle>

  <g font-family="Segoe UI, Inter, Arial, sans-serif" text-anchor="middle">
    <g transform="translate(700 220)">
      <circle r="83" fill="url(#core)" stroke="#c084fc" stroke-width="2.3" filter="url(#glow)">
        <animate attributeName="r" values="80;85;80" dur="5.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="64" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="5 11">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="24s" repeatCount="indefinite"/>
      </circle>
      <text y="-13" font-size="23" font-weight="750" fill="#ffffff">MOHAMMED MUAYAD</text>
      <text y="17" font-size="12" fill="#d8b4fe" letter-spacing="1.4">AI ENGINEERING JOURNEY</text>
      <text y="42" font-size="11" fill="#cbd5e1">Learn • Build • Connect</text>
    </g>

    <g transform="translate(215 220)">
      <circle r="53" fill="url(#pink)" stroke="#fb7185" stroke-width="1.8"/>
      <text y="-5" font-size="16" font-weight="700" fill="#ffffff">GMAIL</text>
      <text y="17" font-size="9.8" fill="#fecdd3">Public email</text>
    </g>

    <g transform="translate(445 125)">
      <circle r="53" fill="url(#blue)" stroke="#60a5fa" stroke-width="1.8"/>
      <text y="-5" font-size="15" font-weight="700" fill="#ffffff">OUTLOOK</text>
      <text y="17" font-size="9.8" fill="#bfdbfe">Personal email</text>
    </g>

    <g transform="translate(955 125)">
      <circle r="53" fill="url(#violet)" stroke="#c084fc" stroke-width="1.8"/>
      <text y="-5" font-size="16" font-weight="700" fill="#ffffff">KAGGLE</text>
      <text y="17" font-size="9.8" fill="#e9d5ff">Data projects</text>
    </g>

    <g transform="translate(1185 220)">
      <circle r="53" fill="url(#pink)" stroke="#fb7185" stroke-width="1.8"/>
      <text y="-5" font-size="13.5" font-weight="700" fill="#ffffff">INSTAGRAM</text>
      <text y="17" font-size="9.8" fill="#fecdd3">Visual journey</text>
    </g>

    <g transform="translate(700 360)">
      <circle r="53" fill="url(#blue)" stroke="#60a5fa" stroke-width="1.8"/>
      <text y="-5" font-size="16" font-weight="700" fill="#ffffff">GITHUB</text>
      <text y="17" font-size="9.8" fill="#bfdbfe">Follow the work</text>
      <circle r="59" fill="none" stroke="#60a5fa" stroke-opacity="0.28">
        <animate attributeName="r" values="56;63;56" dur="4.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.45;0.05;0.45" dur="4.6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>