<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" role="img" aria-labelledby="title desc">
  <title id="title">AI Learning Roadmap</title>
  <desc id="desc">Calm animated roadmap from Python foundations to Generative AI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08060f"/>
      <stop offset="56%" stop-color="#0a1426"/>
      <stop offset="100%" stop-color="#170a17"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb4d83"/>
      <stop offset="35%" stop-color="#d946ef"/>
      <stop offset="60%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb4d83" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.22"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1400" height="500" rx="24" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1397" height="497" rx="23" fill="none" stroke="url(#border)" stroke-width="3"/>

  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <text x="700" y="58" text-anchor="middle" font-size="33" font-weight="700" fill="#ffffff">Learning Roadmap</text>
    <text x="700" y="88" text-anchor="middle" font-size="14" fill="#aeb8d8" letter-spacing="2.4">FROM FOUNDATIONS TO INTELLIGENT SYSTEMS</text>

    <path id="route" d="M105 258 C220 128 340 364 470 246 S700 126 820 258 S1050 378 1178 246 S1288 176 1325 246" fill="none" stroke="url(#line)" stroke-width="3.2" stroke-linecap="round" opacity="0.72"/>
    <path d="M105 258 C220 128 340 364 470 246 S700 126 820 258 S1050 378 1178 246 S1288 176 1325 246" fill="none" stroke="url(#line)" stroke-width="1.1" stroke-linecap="round" stroke-dasharray="8 15" opacity="0.78">
      <animate attributeName="stroke-dashoffset" values="0;-300" dur="18s" repeatCount="indefinite"/>
    </path>

    <circle r="6" fill="#ffffff" filter="url(#glow)">
      <animateMotion dur="13s" repeatCount="indefinite"><mpath href="#route"/></animateMotion>
    </circle>

    <g text-anchor="middle">
      <g transform="translate(105 258)">
        <circle r="36" fill="#251638" stroke="#c084fc" stroke-width="2.5" filter="url(#glow)"><animate attributeName="r" values="34;39;34" dur="3.8s" repeatCount="indefinite"/></circle>
        <text y="8" font-size="26" font-family="Segoe UI Emoji">🐍</text>
        <text y="72" font-size="16" font-weight="700" fill="#ffffff">Python</text>
        <text y="95" font-size="12" fill="#d8b4fe">Active</text>
      </g>
      <g transform="translate(280 178)">
        <circle r="31" fill="#111b2a" stroke="#60a5fa" stroke-width="2"/>
        <text y="8" font-size="22" font-family="Segoe UI Emoji">📊</text>
        <text y="64" font-size="15" font-weight="700" fill="#ffffff">Data Analysis</text>
        <text y="86" font-size="12" fill="#93c5fd">Next</text>
      </g>
      <g transform="translate(455 304)">
        <circle r="31" fill="#161727" stroke="#818cf8" stroke-width="2"/>
        <text y="8" font-size="22" font-family="Segoe UI Emoji">🧹</text>
        <text y="64" font-size="15" font-weight="700" fill="#ffffff">Preprocessing</text>
        <text y="86" font-size="12" fill="#a5b4fc">Planned</text>
      </g>
      <g transform="translate(635 188)">
        <circle r="31" fill="#1b1528" stroke="#a78bfa" stroke-width="2"/>
        <text y="8" font-size="22" font-family="Segoe UI Emoji">🤖</text>
        <text y="64" font-size="15" font-weight="700" fill="#ffffff">Machine Learning</text>
        <text y="86" font-size="12" fill="#c4b5fd">Planned</text>
      </g>
      <g transform="translate(815 310)">
        <circle r="31" fill="#111a29" stroke="#60a5fa" stroke-width="2"/>
        <text y="8" font-size="22" font-family="Segoe UI Emoji">🧠</text>
        <text y="64" font-size="15" font-weight="700" fill="#ffffff">Deep Learning</text>
        <text y="86" font-size="12" fill="#93c5fd">Planned</text>
      </g>
      <g transform="translate(990 188)">
        <circle r="31" fill="#20121f" stroke="#fb7185" stroke-width="2"/>
        <text y="8" font-size="22" font-family="Segoe UI Emoji">💬</text>
        <text y="64" font-size="15" font-weight="700" fill="#ffffff">NLP</text>
        <text y="86" font-size="12" fill="#fda4af">Planned</text>
      </g>
      <g transform="translate(1168 304)">
        <circle r="31" fill="#1a1326" stroke="#d946ef" stroke-width="2"/>
        <text y="8" font-size="22" font-family="Segoe UI Emoji">🚀</text>
        <text y="64" font-size="15" font-weight="700" fill="#ffffff">LLMs</text>
        <text y="86" font-size="12" fill="#e9d5ff">Planned</text>
      </g>
      <g transform="translate(1325 246)">
        <circle r="36" fill="#271320" stroke="#fb7185" stroke-width="2.5" filter="url(#glow)"><animate attributeName="opacity" values="0.55;1;0.55" dur="4.2s" repeatCount="indefinite"/></circle>
        <text y="8" font-size="26" font-family="Segoe UI Emoji">✨</text>
        <text y="72" font-size="16" font-weight="700" fill="#ffffff">Generative AI</text>
        <text y="95" font-size="12" fill="#fda4af">Destination</text>
      </g>
    </g>

    <text x="700" y="458" text-anchor="middle" font-size="15" fill="#94a3b8" letter-spacing="1.2">EACH STAGE BUILDS THE KNOWLEDGE REQUIRED FOR THE NEXT</text>
  </g>
</svg>