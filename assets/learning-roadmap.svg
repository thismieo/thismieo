<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" role="img" aria-labelledby="title desc">
  <title id="title">AI Learning Roadmap</title>
  <desc id="desc">Animated roadmap from Python fundamentals to Generative AI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090611"/>
      <stop offset="55%" stop-color="#101b30"/>
      <stop offset="100%" stop-color="#331120"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#c2416c"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="500" rx="26" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1397" height="497" rx="25" fill="none" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="3"/>

  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <text x="700" y="58" text-anchor="middle" font-size="34" font-weight="700" fill="#ffffff">Learning Roadmap</text>
    <text x="700" y="88" text-anchor="middle" font-size="16" fill="#a5b4fc" letter-spacing="2">FROM FOUNDATIONS TO INTELLIGENT SYSTEMS</text>

    <path d="M115 250 C250 130 355 365 505 245 S755 130 895 250 S1140 365 1285 245"
          fill="none" stroke="url(#line)" stroke-width="5" stroke-linecap="round"
          stroke-dasharray="14 15" filter="url(#glow)">
      <animate attributeName="stroke-dashoffset" values="0;-290" dur="16s" repeatCount="indefinite"/>
    </path>

    <g text-anchor="middle">
      <g transform="translate(115 250)">
        <circle r="39" fill="#29184b" stroke="#a78bfa" stroke-width="3" filter="url(#glow)">
          <animate attributeName="r" values="37;42;37" dur="3s" repeatCount="indefinite"/>
        </circle>
        <text y="8" font-size="27" font-family="Segoe UI Emoji">🐍</text>
        <text y="76" font-size="17" font-weight="700" fill="#ffffff">Python</text>
        <text y="100" font-size="13" fill="#c4b5fd">In progress</text>
      </g>

      <g transform="translate(285 170)">
        <circle r="34" fill="#102735" stroke="#38bdf8" stroke-width="2"/>
        <text y="8" font-size="24" font-family="Segoe UI Emoji">📊</text>
        <text y="68" font-size="16" font-weight="700" fill="#ffffff">Data Analysis</text>
        <text y="91" font-size="13" fill="#67e8f9">Next</text>
      </g>

      <g transform="translate(460 292)">
        <circle r="34" fill="#1a2233" stroke="#60a5fa" stroke-width="2"/>
        <text y="8" font-size="24" font-family="Segoe UI Emoji">🧹</text>
        <text y="68" font-size="16" font-weight="700" fill="#ffffff">Preprocessing</text>
        <text y="91" font-size="13" fill="#93c5fd">Planned</text>
      </g>

      <g transform="translate(635 190)">
        <circle r="34" fill="#20192e" stroke="#8b5cf6" stroke-width="2"/>
        <text y="8" font-size="24" font-family="Segoe UI Emoji">🤖</text>
        <text y="68" font-size="16" font-weight="700" fill="#ffffff">Machine Learning</text>
        <text y="91" font-size="13" fill="#c4b5fd">Planned</text>
      </g>

      <g transform="translate(810 305)">
        <circle r="34" fill="#171f31" stroke="#22d3ee" stroke-width="2"/>
        <text y="8" font-size="24" font-family="Segoe UI Emoji">🧠</text>
        <text y="68" font-size="16" font-weight="700" fill="#ffffff">Deep Learning</text>
        <text y="91" font-size="13" fill="#67e8f9">Planned</text>
      </g>

      <g transform="translate(980 190)">
        <circle r="34" fill="#2e1522" stroke="#c2416c" stroke-width="2"/>
        <text y="8" font-size="24" font-family="Segoe UI Emoji">💬</text>
        <text y="68" font-size="16" font-weight="700" fill="#ffffff">NLP</text>
        <text y="91" font-size="13" fill="#f9a8d4">Planned</text>
      </g>

      <g transform="translate(1140 300)">
        <circle r="34" fill="#251328" stroke="#a855f7" stroke-width="2"/>
        <text y="8" font-size="24" font-family="Segoe UI Emoji">🚀</text>
        <text y="68" font-size="16" font-weight="700" fill="#ffffff">LLMs</text>
        <text y="91" font-size="13" fill="#d8b4fe">Planned</text>
      </g>

      <g transform="translate(1285 245)">
        <circle r="38" fill="#351420" stroke="#e879a7" stroke-width="3" filter="url(#glow)">
          <animate attributeName="opacity" values="0.55;1;0.55" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <text y="8" font-size="27" font-family="Segoe UI Emoji">✨</text>
        <text y="76" font-size="17" font-weight="700" fill="#ffffff">Generative AI</text>
        <text y="100" font-size="13" fill="#f9a8d4">Destination</text>
      </g>
    </g>

    <text x="700" y="455" text-anchor="middle" font-size="17" fill="#cbd5e1">Each stage builds the knowledge required for the next one.</text>
  </g>
</svg>
